<header class="header-fixed">
  <div class="header-left">
    <i class="bi bi-cart4" id="carrinho"></i>
    <nav>
      <h1 class="app-title">{{ 'appTitle' | translate }}</h1>
    </nav>
  </div>
  <div class="header-controls">

    <button 
      (click)="toggleTheme()" 
      class="icon-btn desktop-theme-btn"
      [title]="themeService.getCurrentTheme() === 'light' ? 'Tema Escuro' : 'Tema Claro'">
      <i [class]="getThemeIcon()"></i>
    </button>
    <button 
      (click)="toggleLanguage()" 
      class="icon-btn language-toggle desktop-language-btn">
      <i class="bi bi-globe"></i>
      <span class="language-text">{{ getLanguageText() }}</span>
    </button>
    
    <button 
      (click)="toggleSidebar()" 
      class="icon-btn sidebar-toggle-btn"
      title="Menu">
      <i class="bi bi-list"></i>
    </button>
  </div>
</header>
