<div *ngIf="isOpen" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4" (click)="close()">
  <div class="glass-card max-w-lg w-full" (click)="$event.stopPropagation()">
    <div class="flex justify-between items-center p-4 border-b-2 border-white/30">
      <h2 class="text-lg font-bold uppercase">{{ 'scanTitle' | translate }}</h2>
      <button (click)="close()" class="glass-input p-2 rounded-lg hover:bg-white/20">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    <div class="p-4 text-center">
      <div class="mb-3 relative">
        <video 
          #videoElement
          [class.hidden]="!scanning"
          class="w-full max-w-xs mx-auto border-4 border-cyan-400 rounded-lg"
          autoplay
          playsinline></video>
        <div 
          *ngIf="!scanning"
          class="w-48 h-48 mx-auto border-4 border-cyan-400 rounded-lg flex items-center justify-center">
          <i class="bi bi-camera-video text-4xl text-cyan-400"></i>
        </div>
        <div 
          *ngIf="loading"
          class="absolute inset-0 flex items-center justify-center bg-black/50 rounded-lg">
          <div class="text-white text-sm font-bold">{{ 'loading' | translate }}</div>
        </div>
      </div>
      <div class="flex gap-3 justify-center">
        <button
          *ngIf="!scanning"
          (click)="startScan()"
          class="btn-primary text-sm py-2 px-4">
          <i class="bi bi-play-circle"></i>
          <span>{{ 'startScan' | translate }}</span>
        </button>
        <button
          *ngIf="scanning"
          (click)="stopScan()"
          class="btn-primary text-sm py-2 px-4 bg-red-500/20 hover:bg-red-500/30 border-red-400/50">
          <i class="bi bi-stop-circle"></i>
          <span>{{ 'stopScan' | translate }}</span>
        </button>
      </div>
    </div>
  </div>
</div>
